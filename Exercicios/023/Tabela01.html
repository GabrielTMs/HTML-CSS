<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeira tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        td {
            border: 1px solid black;
            padding: 2vh 10vw 2vh 10vw;
        }
        .tds {
            background-color: rgb(57, 107, 107);
        }
        tr.trs {
            background-color: blueviolet;
        }
        table {
            margin: 0px auto;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>Começando primeira tabela</h1>
    <table>
        <tr class="trs">
            <td class="tds">A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr class="trs">
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>C3</td>
            <td>B3</td>
        </tr>
    </table>
    
</body>
</html>
