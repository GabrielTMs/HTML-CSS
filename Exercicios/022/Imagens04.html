<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralizando elementos</title>
    <style>
        section {
            background-image: url(Imagens/target001.png);
            background-size:100% 100%;
            position: relative; 
            background-color: blue;
             width: 900px;
             height: 95vh;
             margin: auto;
        }
        article {
            position: absolute; 
            background-color: brown;
             width: 400px;
             height: 200px;
             left: 50%;
             top: 50%;
             transform: translate(-50%,-50%);

        }
    </style>
</head>
<body>
    <section>
        <article>

        </article>
    </section>
    
</body>
</html>
