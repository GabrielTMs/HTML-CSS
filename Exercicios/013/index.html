<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML</title>
</head>
<body>
    <h1>Videos hospedados localmente.</h1>
    <hr>
    <h2>Esse são os videos hospedados.</h2>
    <video controls poster="midia/Thumbnail.jpg">
     <source src="midia/new.mp4" type="video/mp4">
     <source src="midia/New.webm" type="video/webm">
     <p>Algo deu errado, seu navegador pode não ter compatibilidade com os formatos de vídeos disponíveis no site.</p>
    
    </video>

    <h1>Videos inseridos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/8FEyj7p-fjM?si=bvMJbqV89BWei5Pz" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
