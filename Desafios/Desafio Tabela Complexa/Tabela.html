<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
    <style>
        body {
            font: normal 1em Arial, Helvetica, sans-serif;
        }
        table {
            width: 600px;
            border-collapse: collapse;
            margin: 0px auto;
        }
        caption {
            font: normal 1.5em Arial, Helvetica, sans-serif;
            padding: 10px;
        }
        th,td {
            border: 1px solid black;
            padding: 10px;
        }
        th {
            background-color: #808080da;
            color: #ffffff;
        }
        .thsembranco {
            background-color: white;
            color: black;
        }
        .leftth {
            text-align: left;
            padding-left: 15px;
        }
    </style>
</head>
<body>
    <table>
        <caption>Média de disciplinas</caption>
        <thead>
            <tr>
                <th scope="col" rowspan="2">Área</th>
                <th scope="col" rowspan="2">Disciplinas</th>
                <th scope="colgroup" colspan="2">Notas</th>
                <th scope="col" rowspan="2">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="rowgroup" rowspan="4" class="thsembranco">Exatas</th>
                <td>Matemática</td>
                <td>7.0</td>
                <td>6.0</td>
                <td>7.0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>8.0</td>
                <td>6.0</td>
                <td>5.0</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>5.0</td>
                <td>6.0</td>
                <td>6.5</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>6.0</td>
                <td>6.5</td>
                <td>5.5</td>
            </tr>
            <tr>
                <th scope="row" colspan="4" class="leftth">Média de Exatas</th>
                <td>6.5</td>
            </tr>
            <tr>
                <th scope="rowgroup" rowspan="2" class="thsembranco">Humanas</th>
                <td>História</td>
                <td>9.0</td>
                <td>8.5</td>
                <td>7.5</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>7.0</td>
                <td>8.5</td>
                <td>6.5</td>
            </tr>
            <tr>
                <th scope="row" colspan="4" class="leftth">Média de Humanas</th>
                <td>7.0</td>
            </tr>

        </tbody>
    </table>
    
</body>
</html>
