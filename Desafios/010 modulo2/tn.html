<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            font-family: Arial, Helvetica, sans-serif;
            padding: 0px;
        }
         div {
            background-color: rgb(32, 88, 88);
            padding: 14px 0px 5px 0px;
         } 
         h1 {
            text-align: center;
            color: #ffffff;
            font-weight: normal;
         } 
         nav {
            margin-top: 60px;
            padding-left: 17px;
         } 
         nav > a {
            padding-right: 10px;
            text-decoration: none;
            color: #ffffff;
         }
         nav > a:hover {
            background-color: rgb(49, 179, 99);
            color: #276950;
            width: 10px;
            height: 10px;

         }
    </style>
</head>
<body>
    <div>
        <h1>Tentativa</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Negócios</a>
            <a href="#">Empresas</a>
            <a href="#">Discussões</a>
        </nav>
    </div>
    
</body>
</html>
